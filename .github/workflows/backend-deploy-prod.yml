name: Backend Deploy - Production (Blue-Green)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g., v1.2.3)'
        required: true
      skip_tests:
        description: 'Skip smoke tests (emergency deploy only)'
        type: boolean
        required: false
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/piums
  DEPLOY_ENV: production

jobs:
  # ============================================================================
  # Pre-Deploy Checks
  # ============================================================================

  pre-deploy:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.event.inputs.image_tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Verify all backend images exist
        run: |
          TAG="${{ steps.set-tag.outputs.tag }}"
          echo "Verifying backend images for tag: $TAG"

          SERVICES=(
            "auth-service"
            "users-service"
            "artists-service"
            "catalog-service"
            "booking-service"
            "payments-service"
            "reviews-service"
            "notifications-service"
            "search-service"
            "chat-service"
            "gateway"
          )

          MISSING=0
          for service in "${SERVICES[@]}"; do
            echo "Checking $service:$TAG..."
            if ! docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$service:$TAG > /dev/null 2>&1; then
              echo "ERROR: Image $service:$TAG not found in registry"
              MISSING=$((MISSING + 1))
            else
              echo "OK: $service:$TAG"
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "$MISSING image(s) missing from registry. Aborting deployment."
            exit 1
          fi

          echo "All ${{ env.DEPLOY_ENV }} images verified for tag: $TAG"

  # ============================================================================
  # Backup Production Databases
  # ============================================================================

  backup-databases:
    name: Backup Production Databases
    runs-on: ubuntu-latest
    needs: pre-deploy

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create database backups
        run: |
          ssh -i ~/.ssh/prod_key \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} << 'EOF'
            BACKUP_DIR="/backup/postgres/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            echo "Starting backup to $BACKUP_DIR..."
            docker exec piums-postgres-prod pg_dumpall -U piums > "$BACKUP_DIR/all_databases.sql"

            echo "Backup completed: $BACKUP_DIR"
            ls -lh "$BACKUP_DIR"
          EOF

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/prod_key

  # ============================================================================
  # Database Migrations (sequential for production safety)
  # ============================================================================

  migrate-databases:
    name: Migrate DB - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [pre-deploy, backup-databases]

    strategy:
      max-parallel: 1   # Sequential migrations for production
      fail-fast: true
      matrix:
        service:
          - auth-service
          - users-service
          - artists-service
          - catalog-service
          - booking-service
          - payments-service
          - reviews-service
          - notifications-service
          - search-service
          - chat-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL_PREFIX }}_${{ matrix.service }}
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy
          else
            echo "No Prisma schema found in ${{ matrix.service }}, skipping"
          fi

  # ============================================================================
  # Deploy to Blue Environment
  # ============================================================================

  deploy-blue:
    name: Deploy to Blue Environment
    runs-on: ubuntu-latest
    needs: [pre-deploy, migrate-databases]

    environment:
      name: production-blue

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to blue
        run: |
          scp -i ~/.ssh/prod_key \
            infra/docker/docker-compose.prod.yml \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }}:/opt/piums-blue/docker-compose.yml

      - name: Copy environment file to blue
        run: |
          echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env.prod
          scp -i ~/.ssh/prod_key \
            .env.prod \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }}:/opt/piums-blue/.env

      - name: Start blue environment
        run: |
          ssh -i ~/.ssh/prod_key \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} << 'ENDSSH'
            cd /opt/piums-blue

            export IMAGE_TAG=${{ needs.pre-deploy.outputs.image_tag }}

            # Pull new images
            docker-compose pull

            # Start blue environment
            docker-compose up -d --force-recreate

            # Wait for services to initialize
            sleep 60

            # Show running state
            docker-compose ps
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/prod_key .env.prod

  # ============================================================================
  # Health Checks on Blue
  # ============================================================================

  health-check-blue:
    name: Health Check Blue
    runs-on: ubuntu-latest
    needs: deploy-blue

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Check Gateway
        run: curl -sf https://blue.piums.com/health

      - name: Check Auth Service
        run: curl -sf https://blue.piums.com/api/auth/health

      - name: Check critical backend services
        run: |
          SERVICES=("users" "artists" "catalog" "bookings" "payments")
          for service in "${SERVICES[@]}"; do
            echo "Checking $service..."
            curl -sf https://blue.piums.com/api/$service/health || exit 1
            echo "OK: $service"
          done

  # ============================================================================
  # Smoke Tests on Blue
  # ============================================================================

  smoke-tests-blue:
    name: Smoke Tests (Blue)
    runs-on: ubuntu-latest
    needs: health-check-blue
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run integration smoke tests
        env:
          API_BASE_URL: https://blue.piums.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          echo "Running backend smoke tests against blue environment"
          # Auth flow
          TOKEN=$(curl -sf -X POST https://blue.piums.com/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$TEST_USER_EMAIL\",\"password\":\"$TEST_USER_PASSWORD\"}" \
            | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "ERROR: Auth smoke test failed - could not obtain token"
            exit 1
          fi
          echo "Auth smoke test: OK"

          # Authenticated endpoint check
          STATUS=$(curl -so /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://blue.piums.com/api/users/me)

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Users smoke test failed - status $STATUS"
            exit 1
          fi
          echo "Users smoke test: OK"

          echo "All backend smoke tests passed"

  # ============================================================================
  # Switch Traffic to Blue (Go Live)
  # ============================================================================

  switch-to-blue:
    name: Switch Traffic to Blue
    runs-on: ubuntu-latest
    needs: [health-check-blue, smoke-tests-blue]
    if: success() || needs.smoke-tests-blue.result == 'skipped'

    environment:
      name: production
      url: https://piums.com

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Switch load balancer to blue
        run: |
          ssh -i ~/.ssh/prod_key \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} << 'EOF'
            echo "Switching traffic to blue environment..."
            sudo sed -i 's/piums-green/piums-blue/g' /etc/nginx/sites-enabled/piums.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "Traffic switched to blue"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/prod_key

  # ============================================================================
  # Monitor Production Post-Switch
  # ============================================================================

  monitor:
    name: Monitor Production
    runs-on: ubuntu-latest
    needs: switch-to-blue

    steps:
      - name: Monitor for 5 minutes
        run: |
          echo "Monitoring production for 5 minutes..."
          for i in {1..10}; do
            echo "Check $i/10..."
            curl -sf https://piums.com/health || exit 1
            sleep 30
          done
          echo "Monitoring complete — deployment is stable"

  # ============================================================================
  # Cleanup Old Green Environment
  # ============================================================================

  cleanup-green:
    name: Cleanup Green Environment
    runs-on: ubuntu-latest
    needs: monitor

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Stop and clean green environment
        run: |
          ssh -i ~/.ssh/prod_key \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} << 'EOF'
            cd /opt/piums-green
            docker-compose down
            echo "Green environment stopped"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/prod_key

  # ============================================================================
  # Rollback to Green on Failure
  # ============================================================================

  rollback:
    name: Rollback to Green
    runs-on: ubuntu-latest
    needs: [switch-to-blue, monitor]
    if: failure()

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to green
        run: |
          ssh -i ~/.ssh/prod_key \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} << 'EOF'
            echo "Rolling back to green environment..."
            sudo sed -i 's/piums-blue/piums-green/g' /etc/nginx/sites-enabled/piums.conf
            sudo nginx -t && sudo systemctl reload nginx
            cd /opt/piums-blue
            docker-compose down
            echo "Rollback to green complete"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/prod_key

  # ============================================================================
  # Notification
  # ============================================================================

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [switch-to-blue, monitor]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "==========================================="
          echo " Backend Production Deployment - Summary"
          echo "==========================================="
          echo " Status      : ${{ job.status }}"
          echo " Switch      : ${{ needs.switch-to-blue.result }}"
          echo " Monitor     : ${{ needs.monitor.result }}"
          echo " Image Tag   : ${{ needs.pre-deploy.outputs.image_tag }}"
          echo " Commit      : ${{ github.sha }}"
          echo " URL         : https://piums.com"
          echo "==========================================="
          # TODO: Add Slack/Teams notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"Production Deploy: ${{ job.status }} - Tag: ${{ needs.pre-deploy.outputs.image_tag }}\"}" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
