name: Frontend CI - Build and Test

on:
  push:
    branches:
      - main
      - dave
      - develop
      - Presentation
      - 'feature/**'
    paths:
      - 'apps/web-client/**'
      - 'apps/web-artist/**'
      - 'apps/web-admin/**'
      - '.github/workflows/ci.yml'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - dave
      - develop
      - Presentation
    paths:
      - 'apps/web-client/**'
      - 'apps/web-artist/**'
      - 'apps/web-admin/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/piums

jobs:
  # ============================================================================
  # Lint and Test
  # ============================================================================
  
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - web-client
          - web-artist
          - web-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # Instalar el workspace COMPLETO desde el root. Las 3 webs y @piums/sdk son
      # miembros del workspace (pnpm-workspace.yaml del root); construir en el
      # subdir NO resuelve @piums/sdk (workspace:*) y rompe. El Dockerfile hace
      # exactamente esto (root + pnpm --filter).
      - name: Install dependencies (root workspace)
        run: pnpm install --frozen-lockfile

      - name: Build SDK (dependencia de las webs)
        run: pnpm --filter @piums/sdk build

      - name: Run lint
        run: pnpm --filter ${{ matrix.service }} lint || true
        continue-on-error: true

      - name: Run tests
        run: pnpm --filter ${{ matrix.service }} test || true
        continue-on-error: true

      - name: Build
        run: pnpm --filter ${{ matrix.service }} build

  # ============================================================================
  # (Las webs se despliegan en Vercel desde el repo, no como imágenes Docker.
  #  El antiguo job build-images de las webs se eliminó; la validación de que
  #  compilan queda en lint-and-test de arriba.)
  # ============================================================================

  # ============================================================================
  # Notification
  # ============================================================================

  # Note: Backend CI/CD is handled by backend-ci.yml, backend-deploy-staging.yml
  # and backend-deploy-prod.yml workflows.
  
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "CI Pipeline completed"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

  # ============================================================================
  # Gate agregador: un solo check requerido en la protección de `main`.
  # Falla si lint-and-test (que incluye `next build` de las 3 webs) no pasó.
  # ============================================================================
  frontend-ci-gate:
    name: Frontend CI Gate
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: always()
    steps:
      - name: Verificar resultado de lint-and-test
        run: |
          result="${{ needs.lint-and-test.result }}"
          echo "lint-and-test => $result"
          if [ "$result" != "success" ]; then
            echo "::error::Frontend CI Gate: lint-and-test no pasó ($result)"
            exit 1
          fi
