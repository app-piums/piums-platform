name: Frontend CI - Build and Test

on:
  push:
    branches:
      - main
      - dave
      - develop
      - Presentation
      - 'feature/**'
    paths:
      - 'apps/web-client/**'
      - 'apps/web-artist/**'
      - 'apps/web-admin/**'
      - '.github/workflows/ci.yml'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - dave
      - develop
      - Presentation
    paths:
      - 'apps/web-client/**'
      - 'apps/web-artist/**'
      - 'apps/web-admin/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/piums

jobs:
  # ============================================================================
  # Lint and Test
  # ============================================================================
  
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - web-client
          - web-artist
          - web-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # Instalar el workspace COMPLETO desde el root. Las 3 webs y @piums/sdk son
      # miembros del workspace (pnpm-workspace.yaml del root); construir en el
      # subdir NO resuelve @piums/sdk (workspace:*) y rompe. El Dockerfile hace
      # exactamente esto (root + pnpm --filter).
      - name: Install dependencies (root workspace)
        run: pnpm install --frozen-lockfile

      - name: Build SDK (dependencia de las webs)
        run: pnpm --filter @piums/sdk build

      - name: Run lint
        run: pnpm --filter ${{ matrix.service }} lint || true
        continue-on-error: true

      - name: Run tests
        run: pnpm --filter ${{ matrix.service }} test || true
        continue-on-error: true

      - name: Build
        run: pnpm --filter ${{ matrix.service }} build

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web-client
            context: .
            dockerfile: ./apps/web-client/web/Dockerfile
            app_url: https://client.piums.io
          - service: web-artist
            context: .
            dockerfile: ./apps/web-artist/web/Dockerfile
            app_url: https://artist.piums.io
          - service: web-admin
            context: .
            dockerfile: ./apps/web-admin/web/Dockerfile
            app_url: https://admin.piums.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ matrix.app_url }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  # ============================================================================
  # Notification
  # ============================================================================

  # Note: Backend CI/CD is handled by backend-ci.yml, backend-deploy-staging.yml
  # and backend-deploy-prod.yml workflows.
  
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build-images]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "CI Pipeline completed"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

  # ============================================================================
  # Gate agregador: un solo check requerido en la protección de `main`.
  # Falla si lint-and-test (que incluye `next build` de las 3 webs) no pasó.
  # ============================================================================
  frontend-ci-gate:
    name: Frontend CI Gate
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: always()
    steps:
      - name: Verificar resultado de lint-and-test
        run: |
          result="${{ needs.lint-and-test.result }}"
          echo "lint-and-test => $result"
          if [ "$result" != "success" ]; then
            echo "::error::Frontend CI Gate: lint-and-test no pasó ($result)"
            exit 1
          fi
