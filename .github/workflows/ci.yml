name: Frontend CI - Build and Test

on:
  push:
    branches:
      - main
      - dave
      - develop
      - 'feature/**'
    paths:
      - 'apps/web-client/**'
      - 'apps/web-artist/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - dave
      - develop
    paths:
      - 'apps/web-client/**'
      - 'apps/web-artist/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/piums

jobs:
  # ============================================================================
  # Lint and Test
  # ============================================================================
  
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - web-client
          - web-artist
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine service path
        id: path
        run: |
          if [[ "${{ matrix.service }}" == "web-client" ]]; then
            echo "dir=apps/web-client/web" >> $GITHUB_OUTPUT
            echo "lockfile=apps/web-client/web/pnpm-lock.yaml" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.service }}" == "web-artist" ]]; then
            echo "dir=apps/web-artist/web" >> $GITHUB_OUTPUT
            echo "lockfile=apps/web-artist/web/pnpm-lock.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ${{ steps.path.outputs.lockfile }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ${{ steps.path.outputs.dir }}
        run: pnpm install --frozen-lockfile

      - name: Run lint
        working-directory: ${{ steps.path.outputs.dir }}
        run: pnpm run lint || true
        continue-on-error: true

      - name: Run tests
        working-directory: ${{ steps.path.outputs.dir }}
        run: pnpm test || true
        continue-on-error: true

      - name: Build TypeScript
        working-directory: ${{ steps.path.outputs.dir }}
        run: pnpm run build

  # ============================================================================
  # Build Docker Images
  # ============================================================================
  
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        service:
          - web-client
          - web-artist
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine service path
        id: path
        run: |
          if [[ "${{ matrix.service }}" == "web-client" ]]; then
            echo "context=./apps/web-client/web" >> $GITHUB_OUTPUT
            echo "dockerfile=./apps/web-client/web/Dockerfile" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.service }}" == "web-artist" ]]; then
            echo "context=./apps/web-artist/web" >> $GITHUB_OUTPUT
            echo "dockerfile=./apps/web-artist/web/Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.path.outputs.context }}
          file: ${{ steps.path.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Notification
  # ============================================================================

  # Note: Backend CI/CD is handled by backend-ci.yml, backend-deploy-staging.yml
  # and backend-deploy-prod.yml workflows.
  
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build-images]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "CI Pipeline completed"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
