name: Backend CI - Build, Test & Security

on:
  push:
    branches:
      - main
      - dave
      - develop
      - 'feature/**'
    # Tags de release: publica imágenes con el MISMO tag (v1.2.3) que luego
    # pinea backend-deploy-doks.yml. Los `paths` no se evalúan en push de tags.
    tags:
      - 'v*'
    paths:
      - 'services/**'
      - 'packages/**'
      - 'apps/gateway/**'
      - 'scripts/**'
      - 'infra/k8s/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
      - dave
      - develop
    paths:
      - 'services/**'
      - 'packages/**'
      - 'apps/gateway/**'
      - 'infra/k8s/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/piums

jobs:
  # ============================================================================
  # Lint, Type-Check & Test (per service)
  # ============================================================================

  lint-and-test:
    name: Lint & Test - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - users-service
          - artists-service
          - catalog-service
          - booking-service
          - payments-service
          - reviews-service
          - notifications-service
          - search-service
          - chat-service
          - moderation-service
          - gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine service path
        id: path
        run: |
          if [[ "${{ matrix.service }}" == "gateway" ]]; then
            echo "dir=apps/gateway" >> $GITHUB_OUTPUT
          else
            echo "dir=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      # Policy: strict on main/develop/dave and PRs, tolerant on feature/**
      - name: Determine test policy
        id: policy
        run: |
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feature/* ]]; then
            echo "strict=false" >> $GITHUB_OUTPUT
          else
            echo "strict=true" >> $GITHUB_OUTPUT
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # Workspace pnpm: un solo lockfile en la raíz del monorepo
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Con install de workspace el postinstall de @prisma/client no genera el
      # cliente por servicio (igual que en el Dockerfile, se genera explícito)
      - name: Generate Prisma Client
        working-directory: ${{ steps.path.outputs.dir }}
        run: |
          if [ -f "prisma/schema.prisma" ]; then npx prisma generate; fi

      - name: Run lint
        working-directory: ${{ steps.path.outputs.dir }}
        run: |
          if grep -q '"lint"' package.json 2>/dev/null; then
            pnpm run lint
          else
            echo "No lint script defined, skipping"
          fi
        continue-on-error: true

      - name: Run tests
        working-directory: ${{ steps.path.outputs.dir }}
        run: |
          if grep -q '"test"' package.json 2>/dev/null; then
            pnpm test
          else
            echo "No test script defined, skipping"
          fi
        # Strict on protected branches, tolerant on feature/**
        continue-on-error: ${{ steps.policy.outputs.strict == 'false' }}

      - name: Build TypeScript
        working-directory: ${{ steps.path.outputs.dir }}
        run: pnpm run build

  # ============================================================================
  # Build & Push Docker Images - Backend Services
  # ============================================================================

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - users-service
          - artists-service
          - catalog-service
          - booking-service
          - payments-service
          - reviews-service
          - notifications-service
          - search-service
          - chat-service
          - moderation-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Tag literal del release (v1.2.3, con la v) — es el que pinea el deploy
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Build & Push Gateway Image
  # ============================================================================

  build-gateway:
    name: Build Gateway Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Tag literal del release (v1.2.3, con la v) — es el que pinea el deploy
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Gateway image
        uses: docker/build-push-action@v5
        with:
          # El Dockerfile del gateway copia package.json/pnpm-workspace.yaml de la
          # raíz del monorepo: el contexto debe ser el root
          context: .
          file: ./apps/gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Security Scan (Trivy) - All Backend Services
  # ============================================================================

  security-scan:
    name: Security Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push'

    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - users-service
          - artists-service
          - catalog-service
          - booking-service
          - payments-service
          - reviews-service
          - notifications-service
          - search-service
          - chat-service
          - moderation-service

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Validate Kubernetes manifests (kustomize build + kubeconform)
  # ============================================================================

  validate-k8s-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Build & validate overlays
        run: |
          set -e
          for overlay in base overlays/local overlays/staging overlays/production overlays/production-do; do
            echo "::group::kustomize build infra/k8s/$overlay"
            kustomize build "infra/k8s/$overlay" \
              | kubeconform -strict -summary -ignore-missing-schemas
            echo "::endgroup::"
          done

  # ============================================================================
  # Notification
  # ============================================================================

  notify:
    name: Notify Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-images, build-gateway]
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "====================================="
          echo " Backend CI Pipeline - Summary"
          echo "====================================="
          echo " Lint & Test : ${{ needs.lint-and-test.result }}"
          echo " Build Images: ${{ needs.build-images.result }}"
          echo " Build Gateway: ${{ needs.build-gateway.result }}"
          echo " Branch: ${{ github.ref_name }}"
          echo " Commit: ${{ github.sha }}"
          echo "====================================="
          # TODO: Add Slack/Teams webhook notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"Backend CI: ${{ job.status }} on ${{ github.ref_name }}\"}" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
