name: Auto PR

on:
  push:
    branches:
      - dave
      - develop
      - 'feature/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head ${{ github.ref_name }} --base main --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            PR_NUMBER=$(gh pr create \
              --title "feat: ${{ github.ref_name }} → main" \
              --body "Auto PR desde \`${{ github.ref_name }}\`. Merge automático si CI pasa ✅" \
              --base main \
              --head ${{ github.ref_name }} \
              --json number --jq '.number')
          else
            PR_NUMBER=$EXISTING
          fi

          gh pr merge $PR_NUMBER --auto --squash
