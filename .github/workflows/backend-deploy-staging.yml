name: Backend Deploy - Staging

on:
  push:
    branches:
      - develop
    paths:
      - 'services/**'
      - 'packages/**'
      - 'apps/gateway/**'
      - 'infra/docker/docker-compose.staging.yml'
      - '.github/workflows/backend-deploy-staging.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: develop)'
        required: false
        default: 'develop'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/piums
  DEPLOY_ENV: staging

jobs:
  # ============================================================================
  # Pre-Deploy Checks
  # ============================================================================

  pre-deploy:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.event.inputs.image_tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Verify images exist
        run: |
          TAG="${{ steps.set-tag.outputs.tag }}"
          echo "Verifying backend images for tag: $TAG"

          SERVICES=(
            "auth-service"
            "users-service"
            "artists-service"
            "catalog-service"
            "booking-service"
            "payments-service"
            "reviews-service"
            "notifications-service"
            "search-service"
            "chat-service"
            "gateway"
          )

          for service in "${SERVICES[@]}"; do
            echo "Checking $service:$TAG"
            docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$service:$TAG || true
          done

  # ============================================================================
  # Database Migrations (per service, parallel)
  # ============================================================================

  migrate-databases:
    name: Migrate DB - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: pre-deploy

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - users-service
          - artists-service
          - catalog-service
          - booking-service
          - payments-service
          - reviews-service
          - notifications-service
          - search-service
          - chat-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL_PREFIX }}_${{ matrix.service }}
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy
          else
            echo "No Prisma schema found in ${{ matrix.service }}, skipping"
          fi

  # ============================================================================
  # Deploy to Staging Server
  # ============================================================================

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy, migrate-databases]

    environment:
      name: staging
      url: https://staging.piums.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to server
        run: |
          scp -i ~/.ssh/staging_key \
            infra/docker/docker-compose.staging.yml \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:/opt/piums/docker-compose.yml

      - name: Copy environment file
        run: |
          echo "${{ secrets.STAGING_ENV_FILE }}" > .env.staging
          scp -i ~/.ssh/staging_key \
            .env.staging \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:/opt/piums/.env

      - name: Deploy backend services
        run: |
          ssh -i ~/.ssh/staging_key \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} << 'EOF'
            cd /opt/piums

            # Pull latest backend images
            docker-compose pull

            # Restart services with zero-downtime rolling update
            docker-compose down

            # Start with new images
            docker-compose up -d

            # Wait for services to initialize
            sleep 30

            # Show running containers
            docker-compose ps

            # Clean up dangling images
            docker image prune -f
          EOF

      - name: Gateway health check
        run: |
          sleep 10
          curl -f https://staging.piums.com/health || exit 1

      - name: Cleanup SSH keys
        if: always()
        run: rm -f ~/.ssh/staging_key .env.staging

  # ============================================================================
  # Smoke Tests - Backend Endpoints
  # ============================================================================

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Test Gateway
        run: curl -sf https://staging.piums.com/health

      - name: Test Auth Service
        run: curl -sf https://staging.piums.com/api/auth/health

      - name: Test Users Service
        run: curl -sf https://staging.piums.com/api/users/health

      - name: Test Artists Service
        run: curl -sf https://staging.piums.com/api/artists/health

      - name: Test Catalog Service
        run: curl -sf https://staging.piums.com/api/catalog/health

      - name: Test Booking Service
        run: curl -sf https://staging.piums.com/api/bookings/health

      - name: Test Payments Service
        run: curl -sf https://staging.piums.com/api/payments/health

  # ============================================================================
  # Rollback on Failure
  # ============================================================================

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: failure()

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous version
        run: |
          ssh -i ~/.ssh/staging_key \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} << 'EOF'
            cd /opt/piums
            echo "Rolling back staging backend..."
            docker-compose down
            docker-compose up -d
            echo "Rollback complete"
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/staging_key

  # ============================================================================
  # Notification
  # ============================================================================

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "======================================="
          echo " Backend Staging Deployment - Summary"
          echo "======================================="
          echo " Status     : ${{ job.status }}"
          echo " Deploy     : ${{ needs.deploy.result }}"
          echo " Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo " Image Tag  : ${{ needs.pre-deploy.outputs.image_tag }}"
          echo " Commit     : ${{ github.sha }}"
          echo " URL        : https://staging.piums.com"
          echo "======================================="
          # TODO: Add Slack/Teams notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"Staging Deploy: ${{ job.status }} - ${{ needs.pre-deploy.outputs.image_tag }}\"}" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
