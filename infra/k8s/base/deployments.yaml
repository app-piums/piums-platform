# ============================================================================
# All Service Deployments — Piums Platform
# ============================================================================

# ─────────────────────── API Gateway ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: piums
  labels:
    app: gateway
    tier: edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/app-piums/piums-platform/gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: piums-config
            - secretRef:
                name: piums-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
