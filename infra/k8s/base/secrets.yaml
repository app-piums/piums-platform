apiVersion: v1
kind: Secret
metadata:
  name: piums-secrets
  namespace: piums
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────────
  DATABASE_URL: "postgresql://piums:CHANGE_ME@postgres-service:5432/piums_prod"
  POSTGRES_PASSWORD: "CHANGE_ME"
  MODERATION_DATABASE_URL: "postgresql://piums:CHANGE_ME@postgres-service:5432/piums_moderation"

  # ── Auth / JWT ──────────────────────────────────────────────────────────────
  JWT_SECRET: "CHANGE_ME_STRONG_SECRET_MIN_32_CHARS"
  JWT_REFRESH_SECRET: "CHANGE_ME_STRONG_REFRESH_SECRET_MIN_32_CHARS"
  REFRESH_SECRET: "CHANGE_ME_STRONG_SECRET"
  SESSION_SECRET: "CHANGE_ME_STRONG_SECRET"

  # ── Inter-service ───────────────────────────────────────────────────────────
  INTERNAL_SERVICE_SECRET: "CHANGE_ME_STRONG_SECRET_MIN_32_CHARS"
  PAYMENT_TOKEN_KEY: "CHANGE_ME_32_CHAR_AES_KEY"

  # ── Google OAuth ────────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"

  # ── TikTok OAuth ────────────────────────────────────────────────────────────
  TIKTOK_CLIENT_KEY: "CHANGE_ME"
  TIKTOK_CLIENT_SECRET: "CHANGE_ME"

  # ── Facebook OAuth ──────────────────────────────────────────────────────────
  FACEBOOK_APP_ID: "CHANGE_ME"
  FACEBOOK_APP_SECRET: "CHANGE_ME"

  # ── Tilopay ─────────────────────────────────────────────────────────────────
  TILOPAY_API_KEY: "CHANGE_ME"
  TILOPAY_API_SECRET: "CHANGE_ME"
  TILOPAY_API_USER: "CHANGE_ME"
  TILOPAY_WEBHOOK_SECRET: "CHANGE_ME"

  # ── Stripe ──────────────────────────────────────────────────────────────────
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  STRIPE_PUBLISHABLE_KEY: "pk_live_CHANGE_ME"

  # ── Cloudinary ──────────────────────────────────────────────────────────────
  CLOUDINARY_CLOUD_NAME: "CHANGE_ME"
  CLOUDINARY_API_KEY: "CHANGE_ME"
  CLOUDINARY_API_SECRET: "CHANGE_ME"

  # ── Redis ───────────────────────────────────────────────────────────────────
  REDIS_PASSWORD: "CHANGE_ME"

  # ── Email ───────────────────────────────────────────────────────────────────
  SENDGRID_API_KEY: "CHANGE_ME"
  RESEND_API_KEY: "CHANGE_ME"
  EMAIL_FROM: "noreply@piums.io"

  # ── Firebase ────────────────────────────────────────────────────────────────
  FIREBASE_API_KEY: "CHANGE_ME"
  FIREBASE_SERVICE_ACCOUNT_JSON: "CHANGE_ME_BASE64_JSON"
  FIREBASE_SERVICE_ACCOUNT_KEY: "CHANGE_ME_BASE64_JSON"
