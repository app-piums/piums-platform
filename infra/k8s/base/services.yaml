# ============================================================================
# Kubernetes Services — Piums Platform
# All internal services use ClusterIP; gateway exposed via LoadBalancer
# ============================================================================

# ─────────────────────── API Gateway (LoadBalancer) ─────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: piums
  labels:
    app: gateway
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: https
      port: 443
      targetPort: 3000
      protocol: TCP
---
# ─────────────────────── Auth Service ───────────────────────────────────────
apiVersion: v1
