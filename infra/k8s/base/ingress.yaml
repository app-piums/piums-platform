apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: piums-ingress
  namespace: piums
  annotations:
    kubernetes.io/ingress.class: nginx
    # ssl-redirect disabled: Cloudflare terminates TLS externally and forwards HTTP to the origin.
    # Enabling ssl-redirect with Cloudflare proxy causes an infinite 308 loop.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support (chat-service / Socket.io)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Slowloris: limit concurrent connections per client IP
    nginx.ingress.kubernetes.io/limit-connections: "25"
    nginx.ingress.kubernetes.io/limit-rps: "30"
    # Sticky sessions — ensures WebSocket clients reconnect to the same pod
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "piums-route"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    nginx.ingress.kubernetes.io/session-cookie-samesite: "Strict"
spec:
  rules:
    - host: backend.piums.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 80
