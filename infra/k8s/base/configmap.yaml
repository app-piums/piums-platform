apiVersion: v1
kind: ConfigMap
metadata:
  name: piums-config
  namespace: piums
data:
  NODE_ENV: "production"
  TZ: "America/Guatemala"

  # Service URLs (internal cluster DNS)
  GATEWAY_URL: "http://gateway-service:3000"
  AUTH_SERVICE_URL: "http://auth-service:4001"
  USERS_SERVICE_URL: "http://users-service:4002"
  ARTISTS_SERVICE_URL: "http://artists-service:4003"
  CATALOG_SERVICE_URL: "http://catalog-service:4004"
  PAYMENTS_SERVICE_URL: "http://payments-service:4005"
  REVIEWS_SERVICE_URL: "http://reviews-service:4006"
  NOTIFICATIONS_SERVICE_URL: "http://notifications-service:4007"
  BOOKING_SERVICE_URL: "http://booking-service:4008"
  SEARCH_SERVICE_URL: "http://search-service:4009"
  CHAT_SERVICE_URL: "http://chat-service:4010"

  # CORS — allowed browser origins that may call the gateway directly
  ALLOWED_ORIGINS: "https://artist.piums.io,https://client.piums.io,https://admin.piums.io,https://piums.io,https://www.piums.io,https://backend.piums.io,http://localhost:3000,http://localhost:3001,http://localhost:3002"

  # Frontend URLs
  FRONTEND_URL: "https://client.piums.io"

  # Email
  EMAIL_FROM_NAME: "Piums"
  ADMIN_ALERT_EMAIL: "soporte@piums.io"

  # Push notifications
  ENABLE_PUSH: "true"

  # OAuth callback URLs
  GOOGLE_CALLBACK_URL: "https://backend.piums.io/api/auth/google/callback"
  FACEBOOK_CALLBACK_URL: "https://backend.piums.io/api/auth/facebook/callback"
  TIKTOK_CALLBACK_URL: "https://backend.piums.io/api/auth/tiktok/callback"

  # Infrastructure
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # Ports
  GATEWAY_PORT: "3000"
  AUTH_PORT: "4001"
  USERS_PORT: "4002"
  ARTISTS_PORT: "4003"
  CATALOG_PORT: "4004"
  PAYMENTS_PORT: "4005"
  REVIEWS_PORT: "4006"
  NOTIFICATIONS_PORT: "4007"
  BOOKING_PORT: "4008"
  SEARCH_PORT: "4009"
  CHAT_PORT: "4010"
