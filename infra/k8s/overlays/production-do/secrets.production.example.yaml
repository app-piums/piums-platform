# ============================================================================
# PLANTILLA del Secret de producción (DigitalOcean)  —  NO COMMITEAR CON VALORES
# ----------------------------------------------------------------------------
# Este Secret se aplica FUERA DE BANDA (no lo incluye la kustomization, que
# borra el placeholder de la base con `$patch: delete`). Flujo:
#
#   1. cp secrets.production.example.yaml /tmp/piums-secrets.yaml
#   2. Rellena los valores desde `terraform -chdir=infra/terraform-do output`
#      y tus proveedores (Stripe/Firebase/Cloudinary/...).
#   3. kubectl apply -f /tmp/piums-secrets.yaml      # crea/actualiza el Secret
#   4. shred -u /tmp/piums-secrets.yaml              # borra el archivo con valores
#
# Postgres/Redis son GESTIONADOS por DO. Usa el HOST PRIVADO (VPC) para latencia
# baja y cero cargo de ancho de banda. Postgres exige `?sslmode=require`; Redis
# exige TLS (por eso REDIS_TLS=true y el esquema `rediss://` para moderation).
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: piums-secrets
  namespace: piums
type: Opaque
stringData:
  # ── Postgres gestionado: UNA base por microservicio ─────────────────────────
  # Formato: postgresql://doadmin:PASS@PRIVATE_PG_HOST:25060/<db>?sslmode=require
  AUTH_DATABASE_URL:          "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_auth?sslmode=require"
  USERS_DATABASE_URL:         "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_users?sslmode=require"
  ARTISTS_DATABASE_URL:       "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_artists?sslmode=require"
  CATALOG_DATABASE_URL:       "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_catalog?sslmode=require"
  BOOKING_DATABASE_URL:       "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_bookings?sslmode=require"
  PAYMENTS_DATABASE_URL:      "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_payments?sslmode=require"
  REVIEWS_DATABASE_URL:       "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_reviews?sslmode=require"
  NOTIFICATIONS_DATABASE_URL: "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_notifications?sslmode=require"
  SEARCH_DATABASE_URL:        "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_search?sslmode=require"
  CHAT_DATABASE_URL:          "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_chat?sslmode=require"
  MODERATION_DATABASE_URL:    "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_moderation?sslmode=require"
  # DATABASE_URL genérico: no lo usa ningún servicio (todos tienen el suyo), pero
  # sirve para `prisma db push` puntual desde un pod de utilidad si hiciera falta.
  DATABASE_URL:               "postgresql://doadmin:CHANGE_ME@PRIVATE_PG_HOST:25060/piums_auth?sslmode=require"
  POSTGRES_PASSWORD:          "CHANGE_ME"

  # ── Redis gestionado (TLS obligatorio) ──────────────────────────────────────
  REDIS_HOST:     "PRIVATE_REDIS_HOST"
  REDIS_PORT:     "25061"
  REDIS_PASSWORD: "CHANGE_ME"
  REDIS_TLS:      "true"
  # moderation-service se conecta por URL: el esquema rediss:// activa TLS solo.
  REDIS_URL:      "rediss://default:CHANGE_ME@PRIVATE_REDIS_HOST:25061"

  # ── Auth / JWT ──────────────────────────────────────────────────────────────
  JWT_SECRET: "CHANGE_ME_STRONG_SECRET_MIN_32_CHARS"
  JWT_REFRESH_SECRET: "CHANGE_ME_STRONG_REFRESH_SECRET_MIN_32_CHARS"
  REFRESH_SECRET: "CHANGE_ME_STRONG_SECRET"
  SESSION_SECRET: "CHANGE_ME_STRONG_SECRET"

  # ── Inter-service ───────────────────────────────────────────────────────────
  INTERNAL_SERVICE_SECRET: "CHANGE_ME_STRONG_SECRET_MIN_32_CHARS"
  PAYMENT_TOKEN_KEY: "CHANGE_ME_32_CHAR_AES_KEY"

  # ── Google OAuth ────────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: "CHANGE_ME"
  GOOGLE_CLIENT_SECRET: "CHANGE_ME"

  # ── TikTok OAuth ────────────────────────────────────────────────────────────
  TIKTOK_CLIENT_KEY: "CHANGE_ME"
  TIKTOK_CLIENT_SECRET: "CHANGE_ME"

  # ── Facebook OAuth ──────────────────────────────────────────────────────────
  FACEBOOK_APP_ID: "CHANGE_ME"
  FACEBOOK_APP_SECRET: "CHANGE_ME"

  # ── Tilopay ─────────────────────────────────────────────────────────────────
  TILOPAY_API_KEY: "CHANGE_ME"
  TILOPAY_API_SECRET: "CHANGE_ME"
  TILOPAY_API_USER: "CHANGE_ME"
  TILOPAY_WEBHOOK_SECRET: "CHANGE_ME"

  # ── Stripe ──────────────────────────────────────────────────────────────────
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  STRIPE_PUBLISHABLE_KEY: "pk_live_CHANGE_ME"

  # ── Cloudinary (media: fotos/video de portafolio e historias) ───────────────
  CLOUDINARY_CLOUD_NAME: "CHANGE_ME"
  CLOUDINARY_API_KEY: "CHANGE_ME"
  CLOUDINARY_API_SECRET: "CHANGE_ME"

  # ── Email ───────────────────────────────────────────────────────────────────
  SENDGRID_API_KEY: "CHANGE_ME"
  RESEND_API_KEY: "CHANGE_ME"
  EMAIL_FROM: "noreply@piums.io"

  # ── Firebase (push / FCM) ───────────────────────────────────────────────────
  FIREBASE_API_KEY: "CHANGE_ME"
  FIREBASE_SERVICE_ACCOUNT_JSON: "CHANGE_ME_BASE64_JSON"
  FIREBASE_SERVICE_ACCOUNT_KEY: "CHANGE_ME_BASE64_JSON"
