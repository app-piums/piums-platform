apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: piums

# Note: Ingress requires nginx-ingress controller; HPA requires metrics-server.
# Install them if needed:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
resources:
  - ../../base
  - infra.yaml

# ─── Remap ghcr.io images → locally built docker compose images ─────────────
# Docker Desktop K8s shares the same Docker daemon, so local images are available.
images:
  - name: ghcr.io/app-piums/piums-platform/gateway
    newName: docker-gateway
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/auth-service
    newName: docker-auth-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/users-service
    newName: docker-users-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/artists-service
    newName: docker-artists-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/catalog-service
    newName: docker-catalog-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/payments-service
    newName: docker-payments-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/reviews-service
    newName: docker-reviews-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/notifications-service
    newName: docker-notifications-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/booking-service
    newName: docker-booking-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/search-service
    newName: docker-search-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/chat-service
    newName: docker-chat-service
    newTag: latest

patches:
  # ── Never pull images from registry — use local Docker daemon ─────────────
  - target:
      kind: Deployment
      labelSelector: "tier in (edge, backend)"
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

  # ── 1 replica per service for local dev ──────────────────────────────────
  - target:
      kind: Deployment
      labelSelector: "tier in (edge, backend)"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # ── Override NODE_ENV and add REDIS_URL to configmap ─────────────────────
  - target:
      kind: ConfigMap
      name: piums-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: piums-config
      data:
        NODE_ENV: "development"
        REDIS_URL: "redis://redis-service:6379"

  # ── Override secrets with dev credentials ─────────────────────────────────
  - path: dev-secrets.yaml
    target:
      kind: Secret
      name: piums-secrets

  # ── Per-service DATABASE_URL (env takes precedence over envFrom) ──────────
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
      spec:
        template:
          spec:
            containers:
              - name: auth-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_auth"

  - target:
      kind: Deployment
      name: users-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: users-service
      spec:
        template:
          spec:
            containers:
              - name: users-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_users"

  - target:
      kind: Deployment
      name: artists-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: artists-service
      spec:
        template:
          spec:
            containers:
              - name: artists-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_artists"

  - target:
      kind: Deployment
      name: catalog-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: catalog-service
      spec:
        template:
          spec:
            containers:
              - name: catalog-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_catalog"

  - target:
      kind: Deployment
      name: payments-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payments-service
      spec:
        template:
          spec:
            containers:
              - name: payments-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_payments"

  - target:
      kind: Deployment
      name: reviews-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: reviews-service
      spec:
        template:
          spec:
            containers:
              - name: reviews-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_reviews"

  - target:
      kind: Deployment
      name: notifications-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notifications-service
      spec:
        template:
          spec:
            containers:
              - name: notifications-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_notifications"

  - target:
      kind: Deployment
      name: booking-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: booking-service
      spec:
        template:
          spec:
            containers:
              - name: booking-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_bookings"

  - target:
      kind: Deployment
      name: search-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: search-service
      spec:
        template:
          spec:
            containers:
              - name: search-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_search"

  - target:
      kind: Deployment
      name: chat-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: chat-service
      spec:
        template:
          spec:
            containers:
              - name: chat-service
                env:
                  - name: DATABASE_URL
                    value: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_users"

  # ── Fix PORT env var: services use process.env.PORT but K8s configmap only
  # has BOOKING_PORT, PAYMENTS_PORT etc. — must set PORT explicitly. ─────────
  - target:
      kind: Deployment
      name: payments-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payments-service
      spec:
        template:
          spec:
            containers:
              - name: payments-service
                env:
                  - name: PORT
                    value: "4005"

  - target:
      kind: Deployment
      name: reviews-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: reviews-service
      spec:
        template:
          spec:
            containers:
              - name: reviews-service
                env:
                  - name: PORT
                    value: "4006"

  - target:
      kind: Deployment
      name: notifications-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notifications-service
      spec:
        template:
          spec:
            containers:
              - name: notifications-service
                env:
                  - name: PORT
                    value: "4007"

  - target:
      kind: Deployment
      name: booking-service
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: booking-service
      spec:
        template:
          spec:
            containers:
              - name: booking-service
                env:
                  - name: PORT
                    value: "4008"

  # ── Fix gateway health probe: path is /api/health, not /health ───────────
  - target:
      kind: Deployment
      name: gateway
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway
      spec:
        template:
          spec:
            containers:
              - name: gateway
                livenessProbe:
                  httpGet:
                    path: /api/health
                    port: 3000
                readinessProbe:
                  httpGet:
                    path: /api/health
                    port: 3000
