apiVersion: v1
kind: Secret
metadata:
  name: piums-secrets
  namespace: piums
type: Opaque
stringData:
  # Postgres pod password (used by infra.yaml StatefulSet)
  POSTGRES_PASSWORD: "piums_dev_password"

  # Default DATABASE_URL (overridden per-deployment via kustomization patches)
  DATABASE_URL: "postgresql://piums:piums_dev_password@postgres-service:5432/piums_auth"

  # JWT
  JWT_SECRET: "dev_jwt_secret_CHANGE_IN_PRODUCTION"
  JWT_REFRESH_SECRET: "dev_refresh_secret_CHANGE_IN_PRODUCTION"

  # Redis — no password for local dev
  REDIS_PASSWORD: ""

  # Third-party services — leave as placeholders for local dev
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  STRIPE_SECRET_KEY: "sk_test_placeholder_local"
  STRIPE_WEBHOOK_SECRET: "whsec_placeholder_local"
  CLOUDINARY_CLOUD_NAME: ""
  CLOUDINARY_API_KEY: ""
  CLOUDINARY_API_SECRET: ""

  # Inter-service authentication
  INTERNAL_SERVICE_SECRET: "dev_internal_secret_piums"

  # Tilopay payment credentials
  TILOPAY_API_KEY: "2642-8042-9400-8913-7001"
  TILOPAY_API_SECRET: "9oR8Gb"
  TILOPAY_API_USER: "GHSjvq"
  TILOPAY_API_URL: "https://app.tilopay.com/api/v1"
  CLIENT_APP_URL: "http://client.piums.io"
