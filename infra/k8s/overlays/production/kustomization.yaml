apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: piums

resources:
  - ../../base
  # Hardening: ServiceAccount mínima + Role/RoleBinding (least-privilege).
  # La NetworkPolicy NO se incluye: es opt-in, requiere validar en staging
  # (ver infra/k8s/hardening/README.md).
  - ../../hardening

commonLabels:
  environment: production

patches:
  # Hardening: securityContext no-root + SA piums-app en TODOS los Deployments.
  # Inline (no path externo) por el confinamiento de root de kustomize.
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hardening-securitycontext
      spec:
        template:
          spec:
            serviceAccountName: piums-app
            automountServiceAccountToken: false
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
  # Gateway: more replicas + higher resources
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: gateway
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: 1000m
                    memory: 1Gi
    target:
      kind: Deployment
      name: gateway
  # Auth: 3 replicas for HA
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: auth-service
  # Artists: 3 replicas (high traffic)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: artists-service
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: artists-service
  # Search: 3 replicas (high traffic)
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: search-service
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: search-service
  # Chat: 3 replicas for WebSocket load
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: chat-service
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: chat-service

images:
  - name: ghcr.io/app-piums/piums-platform/gateway
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/auth-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/users-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/artists-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/catalog-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/payments-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/reviews-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/notifications-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/booking-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/search-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/chat-service
    newTag: latest
  - name: ghcr.io/app-piums/piums-platform/moderation-service
    newTag: latest
