# ============================================================================
# Patch del Service del ingress-nginx-controller para DigitalOcean
# ----------------------------------------------------------------------------
# En DOKS, cuando el Service del controller es type=LoadBalancer, DO provisiona
# un DigitalOcean Load Balancer automáticamente. Estas anotaciones lo controlan.
#
# Modelo TLS: Cloudflare termina TLS por fuera y reenvía HTTP al origen (igual
# que hoy — ver base/ingress.yaml). Por eso el LB de DO sólo necesita HTTP en
# 80/443; el certificado real vive en Cloudflare. Si algún día se quita
# Cloudflare, cambiar a `do-loadbalancer-protocol: https` + cert-manager.
#
# Aplicar (después de instalar ingress-nginx):
#   kubectl patch svc ingress-nginx-controller -n ingress-nginx \
#     --type merge --patch-file infra/k8s/ingress-nginx/service-patch-do.yaml
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: "piums-prod-lb"
    # HTTP en 80 y 443 (Cloudflare hace el TLS). El LB no descifra nada.
    service.beta.kubernetes.io/do-loadbalancer-protocol: "http"
    # NOTA: cuentas nuevas de DO crean el LB como tipo REGIONAL_NETWORK (Network
    # LB, capa 4). Ese tipo NO soporta PROXY protocol: hace passthrough TCP y ya
    # preserva la IP real del cliente por sí mismo (junto con
    # externalTrafficPolicy: Local). Por eso NO se habilita proxy-protocol aquí ni
    # en el ConfigMap (use-proxy-protocol debe quedar en su default "false"):
    # activarlo rompe nginx con "empty reply from server".
    # Health check contra el healthz del controller.
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-path: "/healthz"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-port: "10254"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-protocol: "http"
    # Redirigir 80→443 lo hace Cloudflare; aquí lo dejamos pasar.
    service.beta.kubernetes.io/do-loadbalancer-size-unit: "1"
