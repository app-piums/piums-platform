apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  annotations:
    # Attach the restrictive SG (only 80/443) to the NLB.
    # Replace with the actual SG ID output from terraform:
    #   terraform output -module=eks nginx_lb_security_group_id
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "REPLACE_WITH_NGINX_LB_SG_ID"
