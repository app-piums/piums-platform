# ==============================================================================
# Piums Platform - Nginx Configuration
# Production-ready reverse proxy configuration
# ==============================================================================
# Este archivo se monta como /etc/nginx/nginx.conf (config PRINCIPAL), así que
# NECESITA los contextos globales events{} y http{}. Sin ellos nginx aborta con
# "limit_req_zone directive is not allowed here" y el contenedor no arranca.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

# Rate limiting zones (must be in http context)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Slowloris protection
client_header_timeout 10s;
client_body_timeout   10s;
keepalive_timeout     10s 10s;
send_timeout          10s;
reset_timedout_connection on;

# Upstream definitions
upstream web_client {
    server web-client:3000;
}

upstream web_artist {
    server web-artist:3001;
}

upstream web_admin {
    server web-admin:3003;
}

upstream api_gateway {
    server gateway:3000;
}

upstream chat_service {
    server chat-service:4010;
}

# ==============================================================================
# HTTP Server - Redirect to HTTPS
# ==============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name piums.io www.piums.io client.piums.io artist.piums.io admin.piums.io;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==============================================================================
# HTTPS Server - Client App (piums.io)
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name piums.io www.piums.io client.piums.io;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/piums.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/piums.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client Body Size (for file uploads)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/client_access.log;
    error_log /var/log/nginx/client_error.log;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Stripe/Tilopay webhooks — no rate limit, raw body for signature verification
    location /api/webhooks/ {
        proxy_pass http://api_gateway/api/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Auth Routes - Stricter rate limit (must be before general /api/ block)
    location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        add_header Retry-After 60 always;
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Routes - Proxy to Gateway
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        add_header Retry-After 60 always;
        proxy_pass http://api_gateway/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket Support — chat-service handles socket.io directly
    location /socket.io/ {
        proxy_pass http://chat_service/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static Files - Cache heavily
    location /_next/static/ {
        proxy_pass http://web_client/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js App - Client App
    location / {
        proxy_pass http://web_client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ==============================================================================
# HTTPS Server - Artist App (artist.piums.io)
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name artist.piums.io;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/artist.piums.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artist.piums.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client Body Size (for file uploads)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/artist_access.log;
    error_log /var/log/nginx/artist_error.log;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Auth Routes - Stricter rate limit (must be before general /api/ block)
    location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        add_header Retry-After 60 always;
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Subida de video (BFF de Next.js) — la ÚNICA ruta que necesita 100M.
    # Va primero: nginx elige el primer regex que matchea, así que este bloque
    # gana sobre el BFF general de abajo. Acotar el 100M aquí evita que las rutas
    # de foto (/api/portafolio/upload) y de JSON (/api/portafolio/items) pierdan
    # el tope de 10M del server.
    location ~ ^/api/(story-video|portafolio/video)$ {
        # Los regex NO heredan el limit_req de `location /api/` (está declarado
        # dentro de ese bloque, no a nivel server): hay que repetirlo o esta ruta
        # queda sin rate limit.
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        add_header Retry-After 60 always;

        client_max_body_size 100M;

        proxy_pass http://web_artist;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Recibir 100 MB y reenviarlos a artists-service excede los 60s del
        # bloque general con conexiones lentas.
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Resto de rutas BFF de Next.js — van a web_artist, NO al gateway.
    # El `location /api/` de abajo es un prefijo y se tragaría estas rutas (el
    # gateway no las conoce → 404). Un regex tiene precedencia sobre un prefijo
    # simple, así que este bloque las rescata, conservando el tope de 10M del
    # server. Mantener en sync con las rutas de apps/web-artist/web/src/app/api/.
    # `img` es el proxy de Cloudinary (esquiva ad-blockers) que usan avatar,
    # portada, historia y las miniaturas del portafolio.
    location ~ ^/api/(story-video|portafolio|img)(/|$) {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        add_header Retry-After 60 always;

        proxy_pass http://web_artist;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Routes - Proxy to Gateway
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        add_header Retry-After 60 always;
        proxy_pass http://api_gateway/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket Support — chat-service handles socket.io directly
    location /socket.io/ {
        proxy_pass http://chat_service/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static Files - Cache heavily
    location /_next/static/ {
        proxy_pass http://web_artist/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js App - Artist App
    location / {
        proxy_pass http://web_artist;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

