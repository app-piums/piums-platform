# ==============================================================================
# Piums Platform - Nginx Configuration
# Production-ready reverse proxy configuration
# ==============================================================================

# Upstream definitions
upstream web_client {
    server web-client:3000;
}

upstream web_artist {
    server web-artist:3001;
}

upstream api_gateway {
    server gateway:3000;
}

# ==============================================================================
# HTTP Server - Redirect to HTTPS
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    
    server_name piums.com www.piums.com artist.piums.com admin.piums.com;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==============================================================================
# HTTPS Server - Client App (piums.com)
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name piums.com www.piums.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/piums.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/piums.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Client Body Size (for file uploads)
    client_max_body_size 10M;
    
    # Logs
    access_log /var/log/nginx/client_access.log;
    error_log /var/log/nginx/client_error.log;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # API Routes - Proxy to Gateway
    location /api/ {
        proxy_pass http://api_gateway/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # WebSocket Support for Real-time Features
    location /socket.io/ {
        proxy_pass http://api_gateway/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Static Files - Cache heavily
    location /_next/static/ {
        proxy_pass http://web_client/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # Next.js App - Client App
    location / {
        proxy_pass http://web_client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

