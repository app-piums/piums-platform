      PORT: 3000
      NODE_ENV: development
      GATEWAY_INTERNAL_URL: http://host.docker.internal:80
      GATEWAY_URL: http://host.docker.internal:80/api
      AUTH_SERVICE_URL: http://host.docker.internal:80/api
      BOOKING_SERVICE_URL: http://host.docker.internal:80
      CHAT_SERVICE_URL: http://host.docker.internal:80
      NEXT_PUBLIC_APP_URL: https://client.piums.io
      NEXT_PUBLIC_CLIENT_URL: https://client.piums.io
      NEXT_PUBLIC_ARTIST_URL: https://artist.piums.io
      NEXT_PUBLIC_ADMIN_URL: https://admin.piums.io
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_CHAT_SERVICE_URL: https://backend.piums.io
    depends_on:
      - gateway
    networks:
      - piums-network
    restart: unless-stopped

  web-artist:
    build:
      context: ../../
      dockerfile: apps/web-artist/web/Dockerfile
      args:
        GATEWAY_INTERNAL_URL: http://host.docker.internal:80
        # Key real en infra/docker/.env (gitignorado) — el default del Dockerfile es un placeholder
        NEXT_PUBLIC_FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: BC9q3ezyHhjl0G7a7AJU8Az_CH4-tQc4-ENArfGrO5gEer-nSF7RjJYmmCR213XvPnlC9R6gqGnLf3VmkfVjJjU
    container_name: piums-web-artist
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      GATEWAY_INTERNAL_URL: http://host.docker.internal:80
      GATEWAY_URL: http://host.docker.internal:80/api
      AUTH_SERVICE_URL: http://host.docker.internal:80/api
      ARTISTS_SERVICE_URL: http://host.docker.internal:80/api
      USERS_SERVICE_URL: http://host.docker.internal:80
      BOOKING_SERVICE_URL: http://host.docker.internal:80
      CHAT_SERVICE_URL: http://host.docker.internal:80
      CATALOG_API_URL: http://host.docker.internal:80/api/catalog/services
      NEXT_PUBLIC_APP_URL: https://artist.piums.io
      NEXT_PUBLIC_CLIENT_URL: https://client.piums.io
      NEXT_PUBLIC_ARTIST_URL: https://artist.piums.io
      NEXT_PUBLIC_ADMIN_URL: https://admin.piums.io
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_CHAT_SERVICE_URL: https://backend.piums.io
    depends_on:
