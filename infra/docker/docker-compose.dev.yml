version: '3.8'

services:
  # ============================================================================
  # Databases
  # ============================================================================
  
  postgres:
    image: postgres:16-alpine
    container_name: piums-postgres
    environment:
      POSTGRES_USER: piums
      POSTGRES_PASSWORD: piums_dev_password
      POSTGRES_DB: piums_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - piums-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piums -d piums_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: piums-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - piums-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # API Gateway
  # ============================================================================
  
  gateway:
    build:
      context: ../../
      dockerfile: apps/gateway/Dockerfile
    container_name: piums-gateway
    ports:
      - "3005:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3005,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,http://192.168.50.131:3005,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
      AUTH_SERVICE_URL: http://auth-service:4001
      USERS_SERVICE_URL: http://users-service:4002
      ARTISTS_SERVICE_URL: http://artists-service:4003
      CATALOG_SERVICE_URL: http://catalog-service:4004
      PAYMENTS_SERVICE_URL: http://payments-service:4005
      REVIEWS_SERVICE_URL: http://reviews-service:4006
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:4007
      BOOKING_SERVICE_URL: http://booking-service:4008
      SEARCH_SERVICE_URL: http://search-service:4009
      CHAT_SERVICE_URL: http://chat-service:4010
      MODERATION_SERVICE_URL: http://moderation-service:4011
    depends_on:
      - auth-service
      - users-service
      - artists-service
      - catalog-service
      - booking-service
      - payments-service
      - reviews-service
      - notifications-service
      - search-service
      - moderation-service
    networks:
      - piums-network
    restart: unless-stopped

  # ============================================================================
  # Microservices
  # ============================================================================

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    container_name: piums-auth-service
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_auth
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      JWT_REFRESH_SECRET: dev_refresh_secret_CHANGE_IN_PRODUCTION
      REFRESH_SECRET: dev_refresh_secret_CHANGE_IN_PRODUCTION
      SESSION_SECRET: dev_session_secret_CHANGE_IN_PRODUCTION
      REDIS_URL: redis://redis:6379
      BOOKING_SERVICE_URL: http://booking-service:4008
      REVIEWS_SERVICE_URL: http://reviews-service:4006
      USERS_SERVICE_URL: http://users-service:4002
      ARTISTS_SERVICE_URL: http://artists-service:4003
      PAYMENTS_SERVICE_URL: http://payments-service:4005
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
      CLIENT_APP_URL: https://client.piums.io
      ARTIST_APP_URL: https://artist.piums.io
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:4007
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      TIKTOK_CALLBACK_URL: https://backend.piums.io/api/auth/tiktok/callback
      GOOGLE_CALLBACK_URL: https://backend.piums.io/api/auth/google/callback
      FACEBOOK_CALLBACK_URL: https://backend.piums.io/api/auth/facebook/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  users-service:
    build:
      context: ../../services/users-service
      dockerfile: Dockerfile
    container_name: piums-users-service
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_users
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      AUTH_SERVICE_URL: http://auth-service:4001
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      MODERATION_SERVICE_URL: http://moderation-service:4011
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  artists-service:
    build:
      context: ../../services/artists-service
      dockerfile: Dockerfile
    container_name: piums-artists-service
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: development
      PORT: 4003
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_artists
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      CHAT_SERVICE_URL: http://chat-service:4010
      BOOKING_SERVICE_URL: http://booking-service:4008
      PAYMENTS_SERVICE_URL: http://payments-service:4005
      SEARCH_SERVICE_URL: http://search-service:4009
      MODERATION_SERVICE_URL: http://moderation-service:4011
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  catalog-service:
    build:
      context: ../../services/catalog-service
      dockerfile: Dockerfile
    container_name: piums-catalog-service
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_catalog
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  payments-service:
    build:
      context: ../../services/payments-service
      dockerfile: Dockerfile
    container_name: piums-payments-service
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: development
      PORT: 4005
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_payments
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_changeme}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_changeme}
      TILOPAY_API_KEY: ${TILOPAY_API_KEY:-}
