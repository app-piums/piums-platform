    networks:
      - piums-network
    restart: unless-stopped

  web-admin:
    build:
      context: ../../
      dockerfile: apps/web-admin/web/Dockerfile
      args:
        GATEWAY_INTERNAL_URL: http://gateway:3000
    container_name: piums-web-admin
    ports:
      - "3002:3003"
    environment:
      NODE_ENV: development
      GATEWAY_INTERNAL_URL: http://gateway:3000
      GATEWAY_URL: http://gateway:3000/api
      NEXT_PUBLIC_APP_URL: https://admin.piums.io
      NEXT_PUBLIC_API_URL: https://backend.piums.io/api
      NEXT_PUBLIC_CHAT_SERVICE_URL: https://backend.piums.io
    depends_on:
      - gateway
    networks:
      - piums-network
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================

networks:
  piums-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
