  # ============================================================================
  # Frontend Applications
  # ============================================================================

  web-client:
    build:
      context: ../../
      dockerfile: apps/web-client/web/Dockerfile
      args:
        GATEWAY_INTERNAL_URL: http://host.docker.internal:80
        # Key real en infra/docker/.env (gitignorado) — el default del Dockerfile es un placeholder
        NEXT_PUBLIC_FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
