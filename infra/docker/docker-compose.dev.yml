      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      BOOKING_SERVICE_URL: http://booking-service:4008
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:4007
      ARTISTS_SERVICE_URL: http://artists-service:4003
      MODERATION_SERVICE_URL: http://moderation-service:4011
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  notifications-service:
    build:
      context: ../../services/notifications-service
      dockerfile: Dockerfile
    container_name: piums-notifications-service
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss && node dist/index.js"
    ports:
      - "4007:4007"
    environment:
      NODE_ENV: development
      PORT: 4007
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_notifications
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
      FRONTEND_URL: https://client.piums.io
      # Email config — Resend (set RESEND_API_KEY to activate)
      ENABLE_EMAIL: "true"
      ENABLE_PUSH: "true"
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: noreply@piums.io
      EMAIL_FROM_NAME: Piums
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      CHAT_SERVICE_URL: http://chat-service:4010
      CLIENT_APP_URL: https://client.piums.io
      ARTIST_APP_URL: https://artist.piums.io
      # Fallback providers (used only if RESEND_API_KEY is empty)
      EMAIL_PROVIDER: nodemailer
      EMAIL_HOST: ""
      EMAIL_PORT: "587"
      EMAIL_SECURE: "false"
      EMAIL_USER: ""
      EMAIL_PASSWORD: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  booking-service:
    build:
      context: ../../services/booking-service
      dockerfile: Dockerfile
    container_name: piums-booking-service
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: development
      PORT: 4008
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_bookings
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      CATALOG_SERVICE_URL: http://catalog-service:4004
      PAYMENTS_SERVICE_URL: http://payments-service:4005
      CHAT_SERVICE_URL: http://chat-service:4010
      USERS_SERVICE_URL: http://users-service:4002
      ARTISTS_SERVICE_URL: http://artists-service:4003
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:4007
      SEARCH_SERVICE_URL: http://search-service:4009
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      CLIENT_APP_URL: https://client.piums.io
      ARTIST_APP_URL: https://artist.piums.io
      MODERATION_SERVICE_URL: http://moderation-service:4011
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  search-service:
    build:
      context: ../../services/search-service
      dockerfile: Dockerfile
    container_name: piums-search-service
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss && node dist/index.js"
    ports:
      - "4009:4009"
    environment:
      NODE_ENV: development
      PORT: 4009
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_search
      ARTISTS_SERVICE_URL: http://artists-service:4003
      CATALOG_SERVICE_URL: http://catalog-service:4004
      BOOKING_SERVICE_URL: http://booking-service:4008
      REVIEWS_SERVICE_URL: http://reviews-service:4006
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,http://192.168.50.131:3003,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - piums-network
    restart: unless-stopped

  chat-service:
    build:
      context: ../../services/chat-service
      dockerfile: Dockerfile
    container_name: piums-chat-service
    ports:
      - "4010:4010"
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss && node dist/index.js"
    environment:
      NODE_ENV: development
      PORT: 4010
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_chat
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      USERS_SERVICE_URL: http://users-service:4002
      ARTISTS_SERVICE_URL: http://artists-service:4003
      MODERATION_SERVICE_URL: http://moderation-service:4011
      INTERNAL_SERVICE_SECRET: dev_internal_secret_piums
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
    depends_on:
      postgres:
        condition: service_healthy
      users-service:
        condition: service_started
      artists-service:
        condition: service_started
      moderation-service:
        condition: service_started
    networks:
      - piums-network
    restart: unless-stopped

  moderation-service:
    build:
      context: ../../services/moderation-service
      dockerfile: Dockerfile
    container_name: piums-moderation-service
    ports:
      - "4011:4011"
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss && node dist/index.js"
    environment:
      NODE_ENV: development
      PORT: 4011
      DATABASE_URL: postgresql://piums:piums_dev_password@postgres:5432/piums_moderation
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      REDIS_URL: redis://redis:6379
      BLACKLIST_CACHE_TTL_SECONDS: 300
      MAX_STRIKES_BEFORE_RESTRICTION: 3
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://192.168.50.131:3000,http://192.168.50.131:3001,http://192.168.50.131:3002,https://client.piums.io,https://artist.piums.io,https://admin.piums.io,https://backend.piums.io
